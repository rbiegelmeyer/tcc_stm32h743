# openocd_stm32.cfg
# -----------------
# Sobe o OpenOCD para ST-Link + STM32 e habilita a porta TCL RPC (6666),
# usada pelo stm32_debug_link.py.
#
# Rode com:   openocd -f openocd_stm32.cfg

# --- Probe de debug ---------------------------------------------------------
# ST-Link (V2 / V2-1 / V3). Se usar J-Link, troque por:  source [find interface/jlink.cfg]
source [find interface/stlink.cfg]

# SWD (recomendado para STM32). Para JTAG, mude para "jtag".
transport select hla_swd

# --- Alvo -------------------------------------------------------------------
# >>> EDITAR: escolha o arquivo da sua familia. Exemplos comuns:
#   target/stm32f1x.cfg   target/stm32f4x.cfg   target/stm32f7x.cfg
#   target/stm32l4x.cfg   target/stm32g4x.cfg   target/stm32h7x.cfg
set CHIPNAME STM32H743ZITx
source [find target/stm32h7x.cfg]

# --- Portas de servico ------------------------------------------------------
# A porta TCL e o que o nosso script usa. As outras ficam disponiveis para
# ferramentas extras (telnet em 4444, GDB em 3333 — se um dia voce quiser).
tcl_port   6666
telnet_port 4444
gdb_port   3333

# Frequencia do SWD (kHz). Reduza se a conexao for instavel (cabos longos etc.)
adapter speed 1000

# Desabilita probe de memory map do GDB.
# Sem isso, OpenOCD tenta ler 0x5c001000 (flash regs do STM32H7) ao conectar,
# o que falha enquanto a CPU esta rodando e rejeita a conexao GDB.
gdb_memory_map disable

init

# Ao conectar GDB: apenas parar o nucleo, sem reset.
# Ao desconectar GDB: retomar a execucao automaticamente.
$_CHIPNAME.cm7 configure -event gdb-attach  { halt }
$_CHIPNAME.cm7 configure -event gdb-detach  { resume }
