# This is an NUCLEO-H743ZI2 board with a single STM32H743ZITx chip
#
# Generated by STM32CubeIDE
# Take care that such file, as generated, may be overridden without any early notice. Please have a look to debug launch configuration setup(s)

source [find interface/stlink-dap.cfg]


set WORKAREASIZE 0x8000

transport select "dapdirect_swd"

set CHIPNAME STM32H743ZITx
set BOARDNAME NUCLEO-H743ZI2

# Enable debug when in low power modes
set ENABLE_LOW_POWER 1

# Stop Watchdog counters when halt
set STOP_WATCHDOG 1

# STlink Debug clock frequency
set CLOCK_FREQ 8000

# Reset configuration
# connect_assert_srst removido: incompativel com captura de firmware em execucao
# (colocava o target em reset ao conectar GDB, impedindo halt e leitura de memoria)
reset_config srst_only srst_nogate
set CONNECT_UNDER_RESET 0
set CORE_RESET 0

# ACCESS PORT NUMBER
set AP_NUM 0
# GDB PORT
set GDB_PORT 3333




set DUAL_BANK 1


# BCTM CPU variables

source [find target/stm32h7x.cfg]

# ---------------------------------------------------------------------------
# Configuracoes para uso com stm32_debug_link.py (GDB via porta 3333)
# ---------------------------------------------------------------------------

# Desabilita probe de memory map ao conectar GDB.
# Sem isso, OpenOCD le 0x5c001000 (flash regs) com CPU rodando e rejeita
# a conexao com "auto_probe failed".
gdb_memory_map disable

# Ao conectar GDB: apenas parar o nucleo, sem reset.
# Ao desconectar GDB: retomar a execucao automaticamente.
# (Sobrescreve o evento padrao do stm32h7x.cfg que faz 'reset init')
$_CHIPNAME.cm7 configure -event gdb-attach { halt }
$_CHIPNAME.cm7 configure -event gdb-detach { resume }
